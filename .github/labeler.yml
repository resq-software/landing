# Area labels
"area:app":
  - changed-files:
    - any-glob-to-any-file: src/app/**/*

"area:components":
  - changed-files:
    - any-glob-to-any-file: src/components/**/*

"area:features":
  - changed-files:
    - any-glob-to-any-file: src/features/**/*

"area:styles":
  - changed-files:
    - any-glob-to-any-file: src/styles/**/*

"area:public":
  - changed-files:
    - any-glob-to-any-file: public/**/*

# Governance & CI
"A-DevOps":
  - changed-files:
    - any-glob-to-any-file: .github/**/*

"C-Documentation":
  - changed-files:
    - any-glob-to-any-file: "**/*.md"
    - any-glob-to-any-file: docs/**/*
